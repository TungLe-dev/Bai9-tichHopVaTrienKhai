name: Calculation

# Yêu cầu xảy ra khi có sự kiện push và pull request
on:
  push:
    branchs: ["main"]
  pull_request:
    branchs: ["main"]

jobs:
  build:
    run_on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@4
# Cai dat moi truong
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Đảm bảo khớp với version trong pom.xml
          distribution: 'temurin'
          cache: maven
# Thuc thi vong doi
      - name: Build with Maven (Test and Package)
        run: mvn clean package

# Trien khai Action upload artifact de co the luu file .jar
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculation-app-jar
          path: target/*.jar